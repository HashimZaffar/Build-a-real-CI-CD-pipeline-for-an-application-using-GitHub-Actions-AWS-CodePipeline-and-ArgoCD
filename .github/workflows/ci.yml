name: CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main

jobs:
  test-build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    outputs:
      image_name: ${{ steps.image_name.outputs.image_name }}
      image_tags: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Run linting
        run: flake8 app tests

      - name: Check formatting
        run: black --check app tests

      - name: Run security scan
        run: bandit -r app

      - name: Build project artifact
        run: ./scripts/build_artifact.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app-build
          path: dist/

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: image_name
        run: echo "image_name=ghcr.io/${{ github.repository_owner }}/second-project" >> $GITHUB_OUTPUT

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_name.outputs.image_name }}
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{startsWith(github.ref, 'refs/tags/v')}}

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image for validation
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image for main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push multi-platform release image
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  deploy-production:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test-build-and-release
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Show deployment target
        run: |
          echo "Approved for deployment to production."
          echo "Image reference(s):"
          echo "${{ needs.test-build-and-release.outputs.image_tags }}"
